name: Build & Release

on:
  push:
    tags:
      - "v*" # v1.0.0, v1.1.0 등 태그 push 시 빌드

permissions:
  contents: write # GitHub Releases 생성/업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false # Mac/Win 독립 빌드 — 한쪽 실패해도 나머지 계속
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build
        env:
          # Windows standalone 빌드 시 EPERM 회피 — standalone 비활성화
          NEXT_OUTPUT: ${{ matrix.platform == 'win' && 'default' || '' }}

      - name: Build Electron
        run: pnpm tsc -p electron/tsconfig.json

      - name: Package (${{ matrix.platform }})
        run: pnpm electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
